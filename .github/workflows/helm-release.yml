name: Helm Chart Release

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint chart
        run: helm lint chart

  release:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Package chart
        run: |
          mkdir -p dist
          helm package chart --destination dist

      - name: Get chart info
        id: chart
        run: |
          echo "name=$(helm show chart chart | grep '^name:' | awk '{print $2}')" >> $GITHUB_OUTPUT
          echo "version=$(helm show chart chart | grep '^version:' | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz
          generate_release_notes: true
          body: |
            ## Helm Chart Release

            **Chart:** ${{ steps.chart.outputs.name }}
            **Version:** ${{ steps.chart.outputs.version }}

            ### Installation

            ```bash
            # Download and install directly from release
            helm install ${{ steps.chart.outputs.name }} ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.chart.outputs.name }}-${{ steps.chart.outputs.version }}.tgz

            # Or add as a Helm repository (if GitHub Pages is enabled)
            helm repo add postgres-ha https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
            helm repo update
            helm install ${{ steps.chart.outputs.name }} postgres-ha/${{ steps.chart.outputs.name }}
            ```

  # Optional: Publish to GitHub Pages as a Helm repository
  pages:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Package chart
        run: |
          mkdir -p /tmp/helm-releases
          helm package chart --destination /tmp/helm-releases

      - name: Checkout gh-pages branch
        run: |
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git fetch origin gh-pages
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

      - name: Copy packaged charts
        run: |
          cp /tmp/helm-releases/*.tgz .

      - name: Generate Helm repo index
        run: |
          if [ -f index.yaml ]; then
            helm repo index . --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }} --merge index.yaml
          else
            helm repo index . --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          fi

      - name: Commit and push
        run: |
          git add *.tgz index.yaml
          git commit -m "Release chart version ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin gh-pages --force
