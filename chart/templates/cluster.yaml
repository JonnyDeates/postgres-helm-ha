apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  instances: {{ .Values.instances }}

  # Automated Failover Logic
  primaryUpdateStrategy: unsupervised

  storage:
    size: {{ .Values.storage.size }}
    {{- if .Values.storage.storageClass }}
    storageClass: {{ .Values.storage.storageClass }}
    {{- end }}

  bootstrap:
    initdb:
      database: app
      owner: app_user
      secret:
        name: {{ .Values.name }}-app-user

  superuserSecret:
    name: {{ .Values.superuser.secretName }}

  # --- Plugin Configuration for Barman Cloud Backups ---
  {{- if .Values.backup.enabled }}
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: {{ .Values.name }}-objectstore
  {{- end }}

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 10
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - node1
                  - node2
                  - node3